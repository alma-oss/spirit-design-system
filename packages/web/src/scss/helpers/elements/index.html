{{#> web/layout/default title="Elements" parentPageName="Helpers" }}

<section class="py-900 py-tablet-1000">
  <div class="Container">

    <h2 class="docs-Heading">Stretched</h2>

    <div class="docs-Stack docs-Stack--stretch">

      <p class="docs-Text">
        Use <code>.element-stretched</code> to make an element's pseudo-element cover the nearest
        positioned ancestor, effectively making the whole area clickable.
      </p>

      <div style="position: relative;" class="bg-secondary py-600 px-600">
        <span>Ancestor with <code>position: relative</code></span>
        <a href="#" class="element-stretched link-primary">Stretched link</a>
      </div>

    </div>

  </div>
</section>

{{/web/layout/default}}
