{{#> web/layout/default title="Cursors" parentPageName="Helpers" }}

<section class="py-900 py-tablet-1000">
  <div class="Container">

    <h2 class="docs-Heading">Pointer Cursor</h2>

    <div class="docs-Stack docs-Stack--stretch">

      <p class="docs-Text">
        Use <code>.cursor-pointer</code> to apply a pointer cursor to any interactive element, such as a
        label next to a checkbox, radio button, or toggle.
      </p>

      <div class="Flex Flex--horizontal Flex--inline" style="--flex-spacing-x: var(--spirit-space-500);">
        <input
          type="checkbox"
          id="checkbox-default"
          class="Checkbox"
          name="default"
        />
        <div>
          <label class="Label cursor-pointer" for="checkbox-default">Checkbox Label</label>
        </div>
      </div>

    </div>

  </div>
</section>

{{/web/layout/default}}
