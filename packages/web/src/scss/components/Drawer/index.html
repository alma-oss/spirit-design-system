{{#> web/layout/default title="Drawer" parentPageName="Components" }}

<script type="module">
  import Offcanvas from '../../../js/Offcanvas';

  document.addEventListener("DOMContentLoaded", () => {
    const radios = document.querySelectorAll('input[name="drawer-alignment"]');
    const drawer = document.getElementById("drawer-example");
    const backdropCheckbox = document.getElementById("drawer-is-closable-on-backdrop-click");
    const escapeKeyCheckbox = document.getElementById("drawer-is-closable-on-escape-key");
    const contentTextArea = document.getElementById("drawer-content");
    const drawerContentDiv = drawer.querySelector("[data-drawer-demo-content]");

    // Initialize the Offcanvas plugin
    const offcanvas = new Offcanvas(drawer, {
      closableOnBackdropClick: backdropCheckbox.checked,
      closableOnEscapeKey: escapeKeyCheckbox.checked,
    });

    // Handle alignment changes
    radios.forEach(radio => {
      radio.addEventListener("change", () => {
        if (radio.checked) {
          if (radio.value === "left") {
            drawer.classList.replace("Drawer--right", "Drawer--left");
          } else if (radio.value === "right") {
            drawer.classList.replace("Drawer--left", "Drawer--right");
          }
        }
      });
    });

    // Handle configuration changes
    backdropCheckbox.addEventListener("change", () => {
      offcanvas.config.closableOnBackdropClick = backdropCheckbox.checked;
    });

    escapeKeyCheckbox.addEventListener("change", () => {
      offcanvas.config.closableOnEscapeKey = escapeKeyCheckbox.checked;
    });

    // Handle content changes
    contentTextArea.addEventListener("input", () => {
      drawerContentDiv.textContent = contentTextArea.value;
    });
  });
</script>

<section class="py-900 py-tablet-1000">

  <div class="Container">
    <h2 class="docs-Heading">Drawer</h2>

    <div class="docs-Stack docs-Stack--start">

      <form class="mb-600">
        <fieldset class="border-0">
          <legend>Drawer alignment:</legend>
          <div class="my-500">
            <div class="Flex Flex--horizontal Flex--inline mr-600" style="--flex-spacing-x: var(--spirit-space-500);">
              <input
                name="drawer-alignment"
                autocomplete="off"
                type="radio"
                id="drawer-alignment-left"
                class="Radio"
                value="left"
              />
              <div>
                <label
                  class="Label Label--inline"
                  for="drawer-alignment-left"
                >
                  Left
                </label>
              </div>
            </div>
            <div class="Flex Flex--horizontal Flex--inline" style="--flex-spacing-x: var(--spirit-space-500);">
              <input
                name="drawer-alignment"
                autocomplete="off"
                type="radio"
                id="drawer-alignment-right"
                class="Radio"
                value="right"
                checked=""
              >
              <div>
                <label
                  class="Label Label--inline"
                  for="drawer-alignment-right"
                >
                  Right
                </label>
              </div>
            </div>
          </div>
        </fieldset>
        <fieldset class="border-0">
          <div class="Stack Stack--spacing">
            <div class="Flex Flex--horizontal Flex--inline" style="--flex-spacing-x: var(--spirit-space-500);">
              <input
                name="is-closable-on-backdrop-click"
                type="checkbox"
                id="drawer-is-closable-on-backdrop-click"
                class="Checkbox"
                value=""
                checked=""
              >
              <div>
                <label
                  class="Label Label--inline"
                  for="drawer-is-closable-on-backdrop-click"
                >
                  Closable on Backdrop Click
                </label>
              </div>
            </div>
            <div class="Flex Flex--horizontal Flex--inline" style="--flex-spacing-x: var(--spirit-space-500);">
              <input
                name="is-closable-on-escape-key"
                type="checkbox"
                id="drawer-is-closable-on-escape-key"
                class="Checkbox"
                value=""
                checked=""
              >
              <div>
                <label
                  class="Label Label--inline"
                  for="drawer-is-closable-on-escape-key"
                >
                  Closable on Escape Key Down
                </label>
              </div>
            </div>
            <div>
              <label
                for="drawer-content"
                class="Label"
              >Drawer content</label>
              <div class="InputContainer InputContainer--fill InputContainer--medium">
                <textarea
                  name="content"
                  id="drawer-content"
                >This is a Drawer content.</textarea>
              </div>
            </div>
          </div>
        </fieldset>
      </form>

      <button
        type="button"
        data-testid="drawer-open-button"
        class="Button Button--primary Button--medium"
        data-spirit-toggle="offcanvas"
        data-spirit-target="#drawer-example"
        aria-controls="drawer-example"
        aria-expanded="false"
      >
        Open Drawer
      </button>

      <!-- Drawer: start -->
      <dialog
        id="drawer-example"
        class="Drawer Drawer--right"
        aria-label="Drawer"
      >
        <div
          class="DrawerPanel"
          data-testid="drawer-panel"
        >
          <header class="DrawerPanelHeader">
            <button
              type="button"
              aria-expanded="false"
              class="ControlButton ControlButton--large text-color-scheme dynamic-color-background-interactive accessibility-tap-target ControlButton--hasBackground dynamic-color-border ControlButton--symmetrical"
              data-spirit-dismiss="offcanvas"
              data-spirit-target="#drawer-example"
              aria-controls="drawer-example"
            >
              <svg
                class="Icon"
                width="16"
                height="16"
                aria-hidden="true"
              >
                <use href="/assets/icons/svg/sprite.svg#close" />
              </svg>
              <span class="accessibility-hidden">Close</span>
            </button>
          </header>
          <div
            class="DrawerPanelBody DrawerPanelBody--spacing"
            data-drawer-demo-content
          >This is a Drawer content.</div>
        </div>
      </dialog>
      <!-- Drawer: end -->

    </div>
  </div>
</section>

{{/web/layout/default }}
