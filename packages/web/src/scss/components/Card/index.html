{{#> web/layout/default title="Card" parentPageName="Components" }}

{{> Card/preview}}

<section class="py-900 py-tablet-1000">

  <div class="Container">

    <h2 class="docs-Heading">Article Card</h2>

    <div class="docs-Stack docs-Stack--stretch">

      <div class="Grid Grid--cols-1 Grid--tablet--cols-2">

        <article class="Card Card--horizontal Card--alignmentYCenter">
          <div class="CardMedia CardMedia--medium CardMedia--expanded">
            <div class="CardMedia__canvas">
              <!-- User content, no component classes -->
              <img
                src="https://picsum.photos/id/200/180/180"
                alt=""
              />
              <!-- End user content -->
            </div>
          </div>
          <div class="CardBody">
            <div class="Stack Stack--hasSpacing" style="--stack-spacing: var(--spirit-space-400)">
              <!-- User content, no component classes -->
              <div class="CardEyebrow">Eyebrow</div>
              <h4 class="CardTitle CardTitle--heading">
                <a
                  href="/article-123"
                  class="CardLink"
                >
                  Article Title
                </a>
              </h4>
              <p class="text-truncate-multiline">Lorem ipsum dolor sit amet, consectetuer adipiscing elit. Aenean fermentum risus id tortor. dolor sit amet</p>
              <div class="link-primary">Read more</div>
              <!-- End user content -->
            </div>
          </div>
        </article>

      </div>

    </div>

  </div>

</section>

{{/web/layout/default }}
