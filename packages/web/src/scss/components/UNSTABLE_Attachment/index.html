{{#> web/layout/default title="Attachment" parentPageName="Components" isUnstable=true }}

<section class="py-900 py-tablet-1000">
  <div class="Container Container--xlarge">
    <h2 class="docs-Heading">
      Attachment
      <span class="Tag Tag--medium Tag--subtle Tag--warning">Visual demo only</span>
    </h2>

    <div class="docs-Stack docs-Stack--start">
      <ul class="Stack Stack--hasSpacing" aria-label="Attachments">
        <li class="Attachment" id="attachment-1" data-file-name="Document.pdf">
          <svg width="24" height="24" aria-hidden="true">
            <use xlink:href="/assets/icons/svg/sprite.svg#file" />
          </svg>
          <span class="Attachment__name">
            <span class="text-truncate">Document.pdf</span>
          </span>
          <button type="button" class="Attachment__action">
            <span class="accessibility-hidden">Remove</span>
            <svg width="24" height="24" aria-hidden="true">
              <use xlink:href="/assets/icons/svg/sprite.svg#close" />
            </svg>
          </button>
        </li>

        <li class="Attachment" id="attachment-2" data-file-name="Image with a long name.jpg">
          <span class="Attachment__image">
            <img src="https://picsum.photos/id/823/132/162" width="54" height="54" alt="Image with a long name.jpg" />
          </span>
          <span class="Attachment__name">
            <span class="text-truncate">Image with a long name.jpg</span>
          </span>
          <span class="Attachment__slot">
            <button type="button" class="Attachment__action">
              <span class="accessibility-hidden">Edit</span>
              <svg width="24" height="24" aria-hidden="true">
                <use xlink:href="/assets/icons/svg/sprite.svg#edit" />
              </svg>
            </button>
          </span>
          <button type="button" class="Attachment__action">
            <span class="accessibility-hidden">Remove</span>
            <svg width="24" height="24" aria-hidden="true">
              <use xlink:href="/assets/icons/svg/sprite.svg#close" />
            </svg>
          </button>
        </li>

        <li class="Attachment" id="attachment-3" data-file-name="Contained image">
          <span class="Attachment__image">
            <img
              src="https://picsum.photos/id/823/132/162"
              width="54"
              height="54"
              alt="Contained image"
              style="--file-uploader-attachment-image-object-fit: contain"
            />
          </span>
          <span class="Attachment__name">
            <span class="text-truncate">Contained image</span>
          </span>
          <button type="button" class="Attachment__action">
            <span class="accessibility-hidden">Remove</span>
            <svg width="24" height="24" aria-hidden="true">
              <use xlink:href="/assets/icons/svg/sprite.svg#close" />
            </svg>
          </button>
        </li>

        <li class="Attachment" id="attachment-4" data-file-name="Cropped via meta">
          <span class="Attachment__image">
            <img
              src="https://picsum.photos/id/823/132/162"
              width="54"
              height="54"
              alt="Cropped via meta"
              style="
                --file-uploader-attachment-image-top: -28px;
                --file-uploader-attachment-image-left: -18px;
                --file-uploader-attachment-image-width: 89px;
                --file-uploader-attachment-image-height: 109px;
                --file-uploader-attachment-image-object-fit: cover;
              "
            />
          </span>
          <span class="Attachment__name">
            <span class="text-truncate">Cropped via meta</span>
          </span>
          <button type="button" class="Attachment__action">
            <span class="accessibility-hidden">Remove</span>
            <svg width="24" height="24" aria-hidden="true">
              <use xlink:href="/assets/icons/svg/sprite.svg#close" />
            </svg>
          </button>
        </li>
      </ul>
    </div>
  </div>
</section>

{{/web/layout/default}}
