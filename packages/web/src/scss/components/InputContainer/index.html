{{#> web/layout/default title="InputContainer" parentPageName="Components" }}

<section class="py-900 py-tablet-1000">

  <div class="Container">

    <h2 class="docs-Heading">Default</h2>

    <div class="docs-Stack docs-Stack--stretch">

      <div>
        <label
          for="input-container-default"
          class="Label"
        >Label</label>
        <div class="InputContainer InputContainer--medium">
          <input
            type="text"
            id="input-container-default"
            name="default"
            placeholder="Placeholder"
          />
        </div>
      </div>

    </div>

  </div>

</section>

<section class="py-900 py-tablet-1000">

  <div class="Container">

    <h2 class="docs-Heading">Sizes</h2>

    <div class="docs-Stack docs-Stack--stretch">
      <div class="Grid Grid--cols-1 Grid--desktop--cols-3">

        <div>
          <label
            for="input-container-size-small"
            class="Label"
          >Small</label>
          <div class="InputContainer InputContainer--small">
            <input
              type="text"
              id="input-container-size-small"
              name="sizeSmall"
              placeholder="Placeholder"
              aria-describedby="input-container-size-small-helper-text"
            />
          </div>
          <div
            class="HelperText"
            id="input-container-size-small-helper-text"
          >Helper text</div>
        </div>

        <div>
          <label
            for="input-container-size-medium"
            class="Label"
          >Medium (default)</label>
          <div class="InputContainer InputContainer--medium">
            <input
              type="text"
              id="input-container-size-medium"
              name="sizeMedium"
              placeholder="Placeholder"
              aria-describedby="input-container-size-medium-helper-text"
            />
          </div>
          <div
            class="HelperText"
            id="input-container-size-medium-helper-text"
          >Helper text</div>
        </div>

        <div>
          <label
            for="input-container-size-large"
            class="Label"
          >Large</label>
          <div class="InputContainer InputContainer--large">
            <input
              type="text"
              id="input-container-size-large"
              name="sizeLarge"
              placeholder="Placeholder"
              aria-describedby="input-container-size-large-helper-text"
            />
          </div>
          <div
            class="HelperText"
            id="input-container-size-large-helper-text"
          >Helper text</div>
        </div>

      </div>
    </div>

  </div>

</section>

<section class="py-900 py-tablet-1000">

  <div class="Container">

    <h2 class="docs-Heading">Disabled</h2>

    <div class="docs-Stack docs-Stack--stretch">

      <div>
        <label
          for="input-container-disabled"
          class="Label Label--disabled"
        >Label</label>
        <div class="InputContainer InputContainer--medium InputContainer--disabled">
          <input
            type="text"
            id="input-container-disabled"
            name="disabled"
            placeholder="Placeholder"
            disabled
          />
        </div>
      </div>

    </div>

  </div>

</section>

<section class="py-900 py-tablet-1000">

  <div class="Container">

    <h2 class="docs-Heading">Validation State with Validation Text</h2>

    <div class="docs-Stack docs-Stack--stretch">

      <div>
        <label
          for="input-container-warning"
          class="Label"
        >Warning</label>
        <div class="InputContainer InputContainer--medium InputContainer--warning">
          <input
            type="text"
            id="input-container-warning"
            name="warning"
            placeholder="Placeholder"
            value="Filled"
            aria-describedby="input-container-warning-validation-text"
          />
        </div>
        <div
          class="ValidationText ValidationText--warning"
          id="input-container-warning-validation-text"
        >Validation text</div>
      </div>

      <div>
        <label
          for="input-container-danger"
          class="Label"
        >Danger</label>
        <div class="InputContainer InputContainer--medium InputContainer--danger">
          <input
            type="text"
            id="input-container-danger"
            name="danger"
            placeholder="Placeholder"
            value="Filled"
            aria-describedby="input-container-danger-validation-text"
          />
        </div>
        <div
          class="ValidationText ValidationText--danger"
          id="input-container-danger-validation-text"
        >
          <ul>
            <li>Validation text</li>
            <li>Second validation text</li>
          </ul>
        </div>
      </div>

    </div>

  </div>

</section>

<section class="py-900 py-tablet-1000">

  <div class="Container">

    <h2 class="docs-Heading">Input Size</h2>

    <div class="docs-Stack docs-Stack--stretch">

      <div>
        <label
          for="input-container-input-size"
          class="Label"
        >MMYY</label>
        <div class="InputContainer InputContainer--medium">
          <input
            type="text"
            size="4"
            id="input-container-input-size"
            name="inputSize"
            placeholder="0126"
          />
        </div>
      </div>

    </div>

  </div>

</section>

{{/web/layout/default }}
