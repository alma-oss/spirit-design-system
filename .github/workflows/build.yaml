name: 🏗️ Build

on:
  # Run this workflow on push to branches only (not tags)
  push:
    branches:
      - '**'
    paths:
      - packages/design-tokens/**
      - packages/icons/**
      - packages/vite-plugin-spirit-icons/**
      - packages/web/**
      - packages/web-react/**

env:
  NX_BRANCH: ${{ github.event.number || github.ref_name }}
  NX_VERBOSE_LOGGING: true
  NX_NO_CLOUD: true

jobs:
  build:
    name: 👷 Building on Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      matrix:
        # minimum required, current LTS, and next active release line
        node-version: [22, 24, 26]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup and Install
        uses: ./.github/actions/setup-install
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build packages
        run: yarn build

      - name: Check for clean working directory
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Error: Git working directory is not clean"
            git status
            exit 1
          fi
