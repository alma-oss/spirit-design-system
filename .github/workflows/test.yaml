name: 🔍 Code Quality Checks

on:
  # Run this workflow on push to branches only (not tags)
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 9 * * *' # every day at 9:00

permissions:
  actions: write
  contents: read
  pull-requests: read

env:
  NX_BRANCH: ${{ github.event.number || github.ref_name }}
  NX_VERBOSE_LOGGING: true
  NX_NO_CLOUD: true
  CACHE_KEY: repository-cache-key-${{ github.run_id }}

jobs:
  install-build:
    name: 🧶 Install Deps and 🏗️ Build Design Tokens
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-install

      - name: Build
        run: yarn workspace @alma-oss/spirit-design-tokens build

      - name: Save Repository to Cache
        id: save-repository-cache
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ./
          key: ${{ env.CACHE_KEY }}

  lint:
    name: 📐 Code Linting
    needs: [install-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HUSKY: 0

    steps:
      - name: Restore Repository from Cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        id: restore-repository-cache
        with:
          path: ./
          key: ${{ env.CACHE_KEY }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Lint
        run: yarn lint

  unit-tests:
    name: 🧪 Unit Testing
    needs: [install-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HUSKY: 0

    steps:
      - name: Restore Repository from Cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        id: restore-repository-cache
        with:
          path: ./
          key: ${{ env.CACHE_KEY }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Unit Tests
        run: yarn test:unit:coverage

      - name: Upload Coverage Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-reports
          path: |
            packages/web/.coverage/lcov.info
            packages/web-react/.coverage/lcov.info
            packages/analytics/.coverage/lcov.info
            packages/common/.coverage/lcov.info
            packages/codemods/.coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 1

  format:
    name: 💅 Code Formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-install

      - name: Check Code-Style Format
        run: yarn format:check

  types:
    name: 📘 Type Checking
    needs: [install-build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HUSKY: 0

    steps:
      - name: Restore Repository from Cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        id: restore-repository-cache
        with:
          path: ./
          key: ${{ env.CACHE_KEY }}

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Types Check
        run: yarn types

  resolve-coverage-base:
    name: Resolve Coverage Base
    needs: [unit-tests]
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      compare-ref: ${{ steps.resolve.outputs.ref }}
      compare-sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve open PR base branch
        id: resolve
        run: |
          PR_JSON=$(gh pr list \
            --head "${{ github.repository_owner }}:${{ github.ref_name }}" \
            --state open \
            --json baseRefName,baseRefOid \
            --jq '.[0] // empty')

          REF=$(echo "$PR_JSON" | jq -r '.baseRefName // empty')
          SHA=$(echo "$PR_JSON" | jq -r '.baseRefOid // empty')

          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  publish-coverage:
    name: 📊 Publish Code Coverage
    needs: [unit-tests, resolve-coverage-base]
    if: always()
    uses: ./.github/workflows/publish-coverage.yaml
    with:
      compare-ref: ${{ needs.resolve-coverage-base.outputs.compare-ref }}
      compare-sha: ${{ needs.resolve-coverage-base.outputs.compare-sha }}

  cleanup:
    name: 🧹 Cleanup
    needs: [install-build, lint, unit-tests, types, publish-coverage, resolve-coverage-base]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: always() && needs.install-build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # @see: https://github.com/actions/cache/blob/main/tips-and-workarounds.md#force-deletion-of-caches-overriding-default-cache-eviction-policy
      - name: Cleanup cache
        run: |
          gh extension install actions/gh-actions-cache
          gh actions-cache delete "${{ env.CACHE_KEY }}" --confirm
        env:
          GH_TOKEN: ${{ github.token}}
