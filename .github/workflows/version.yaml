name: 🚀 Version
run-name: Version, dry-run:${{ inputs.dryrun }}

on:
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'Dry run'
        required: false
        default: false
        type: boolean
      confirm:
        description: 'Confirm version push (yes/no)'
        required: false
        default: 'no'
        type: string

jobs:
  version:
    name: 🏷️ Version
    runs-on: ubuntu-24.04

    # Git operations and releases use the app token (see below); GITHUB_TOKEN only needs read access.
    permissions:
      contents: read

    steps:
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-install

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Setup git config
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: List affected packages
        run: |
          yarn packages:changed

      - name: Build
        run: |
          make build

      - name: Dry run (preview changes only)
        if: ${{ inputs.dryrun }}
        run: |
          make version DEBUG=true
          echo "ℹ️ Dry run complete. No commits or tags were created."
          git diff

      - name: Bump version (local only)
        if: ${{ !inputs.dryrun && inputs.confirm != 'yes' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          make version MONOREPO_TOOL_FLAGS="--no-push"
          echo "⚠️ Version created locally but NOT pushed."
          echo "ℹ️ To push and create releases, run workflow again with confirm=yes"
          git --no-pager show --stat --patch HEAD

      - name: Bump version and Create GitHub Releases
        if: ${{ !inputs.dryrun && inputs.confirm == 'yes' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "🚀 Creating versions, pushing, and publishing GitHub releases..."
          make version
          echo "✅ Versions bumped, tags pushed, and GitHub releases created"
