name: 🔍 Commit Checks

on:
  push:
    branches-ignore:
      - main

jobs:
  commitlint:
    name: 🧾 Linting Commit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-install

      - name: Run Commitlint
        run: yarn lint:commit
