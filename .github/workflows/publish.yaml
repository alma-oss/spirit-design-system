name: 🚢 Publish

concurrency:
  group: npm-registry
  cancel-in-progress: true

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  has-tags:
    name: 🏷️ Analyze Tags
    runs-on: ubuntu-24.04

    outputs:
      has-tag: ${{ steps.check-tag-exists.outputs.has-tag }}

    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Even though this is set, shallow clones do not always retrieve all tags correctly
          fetch-tags: true
          # So we need to fetch full history, including all tags
          fetch-depth: 0

      - name: Check Tag On Commit
        id: check-tag-exists
        uses: ./.github/actions/has-tags

  publish:
    name: 📦 Publish Packages
    needs: has-tags
    if: ${{ needs.has-tags.outputs.has-tag == 'true' }}
    runs-on: ubuntu-24.04
    environment: npm-registry
    permissions:
      # create commits and releases
      contents: write
      # Required for OIDC
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true

    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Even though this is set, shallow clones do not always retrieve all tags correctly
          fetch-tags: true
          # So we need to fetch full history, including all tags
          fetch-depth: 0

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-install

      - name: Build
        run: yarn build

      - name: Publish
        run: make publish
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Post Changelog
        run: yarn post-changelog
        env:
          SLACK_CHANGELOG_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFICATIONS_WEBHOOK_URL }}
