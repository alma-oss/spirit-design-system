name: 🎨 Storybook on Chromatic
run-name: Storybook on Chromatic — ${{ github.event.inputs.branch || github.ref_name }}

on:
  push:
    branches:
      - main
    paths:
      - 'apps/storybook/**'
      - 'packages/icons/**'
      - 'packages/web-react/**'
      - 'packages/design-tokens/**'
  # allow manual trigger
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy to Chromatic'
        required: false
        type: string
        default: ''

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Deploy Storybook to Chromatic
    runs-on: ubuntu-24.04
    environment: chromatic
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Node and Install Dependencies
        uses: ./.github/actions/setup-install

      - name: Build Storybook
        run: yarn lerna run build --scope=@alma-oss/spirit-storybook --include-dependencies
        env:
          # Disable connection to NX Cloud
          # @see: https://nx.dev/docs/reference/nx-cloud/config#disabling-connections-to-nx-cloud
          NX_NO_CLOUD: 'true'

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@5c6ec06f45a2117a25f07b1bf2b2f3009233fac8 # v16.3.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: apps/storybook
          storybookBuildDir: build
          # TurboSnap: only re-snapshot stories whose code changed vs last accepted baseline
          onlyChanged: true

      - name: Notify Slack with Chromatic URL
        if: always() && (steps.chromatic.outcome == 'success' || steps.chromatic.outcome == 'failure')
        uses: slackapi/slack-github-action@fcfb566f8b0aab22203f066d80ca1d7e4b5d05b3 # v1.27.1
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }} # Slack channel-id of #spirit-design-system-notifications_en
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.chromatic.outcome == 'success' && '#36a64f' || '#ff0000' }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.chromatic.outcome == 'success' && ':green_circle: Chromatic build completed' || ':x: Chromatic build failed' }}",
                        "emoji": true
                      }
                    },
                    {
                      "type": "section",
                      "text": {
                        "type": "mrkdwn",
                        "text": "*Branch:* `${{ github.ref_name }}`\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Status:* `${{ steps.chromatic.outcome }}`"
                      }
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "View in Chromatic" },
                          "url": "${{ steps.chromatic.outputs.url }}"
                        },
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "GitHub Action" },
                          "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFICATIONS_TOKEN }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
