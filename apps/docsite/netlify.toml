# https://docs.netlify.com/configure-builds/file-based-configuration/
# Settings in the [build] context are global and are applied to
# all contexts unless otherwise overridden by more specific contexts.
[build]
# Directory to change to before starting a build.
# This is where we will look for package.json/.nvmrc/etc.
# If not set, defaults to the root directory.
base = "/"

# Directory that contains the deploy-ready HTML files and
# assets generated by the build. This is relative to the base
# directory if one has been set, or the root directory if
# a base has not been set. This sample publishes the directory
# located at the absolute path "root/project/build-output"
publish = "/apps/docsite/.next/"

# Default build command.
command = "yarn lerna run build --scope @alma-oss/spirit-docsite --include-dependencies"

# Ignore builds on Netlify
ignore = "node scripts/ignoreNetlifyBuilds.js"

# @see: https://docs.netlify.com/build/configure-builds/environment-variables/
[build.environment]
# Disable connection to NX Cloud
# @see: https://nx.dev/docs/reference/nx-cloud/config#disabling-connections-to-nx-cloud
NX_NO_CLOUD = "true"

[context.deploy-preview]
# Deploy preview only if there are changes in some directories
ignore = """\
    git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF \
    ./.github/workflows/ \
    ./apps/docsite/ \
    ./packages/design-tokens/ \
    ./packages/icons/ \
    ./packages/web/ \
    ./packages/web-react/ \
    """
